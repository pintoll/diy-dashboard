appId: com.diy-dashboard.app
productName: DIY Dashboard
directories:
  buildResources: resources
  output: dist-electron
files:
  - out/**/*
  - resources/**/*
asarUnpack:
  - "node_modules/get-windows/lib/**/*"
  - "node_modules/get-windows/main"
extraResources:
  - from: resources/focus-guard
    to: focus-guard
    filter: ["**/*.ps1"]
publish:
  provider: github
  owner: pintoll
  repo: diy-dashboard
win:
  target:
    - nsis
  icon: resources/icon.png
nsis:
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false
linux:
  target:
    - AppImage
    - deb
  category: Utility
