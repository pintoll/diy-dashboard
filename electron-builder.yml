appId: com.diy-dashboard.app
productName: DIY Dashboard
directories:
  buildResources: resources
  output: dist-electron
files:
  - out/**/*
  - resources/**/*
publish:
  provider: github
  owner: pintoll
  repo: diy-dashboard
win:
  target:
    - nsis
  icon: resources/icon.png
nsis:
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false
linux:
  target:
    - AppImage
    - deb
  category: Utility
