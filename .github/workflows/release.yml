name: Release Electron App

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    # Pinned to windows-2022 because node-gyp 11.x cannot detect Visual Studio 2026,
    # which is rolling into windows-latest / windows-2025. get-windows needs a native rebuild
    # against Electron's ABI, so a working VS toolchain is required.
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install
        env:
          GYP_MSVS_VERSION: "2022"

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/electron/Cache
          key: electron-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Build & publish
        run: pnpm build && pnpm electron:build --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAIN_VITE_FRED_API_KEY: ${{ secrets.MAIN_VITE_FRED_API_KEY }}
          GYP_MSVS_VERSION: "2022"
